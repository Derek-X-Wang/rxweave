name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# `id-token: write` is the OIDC token that npm's Trusted Publishing
# verifies against the repo + workflow configured on each @rxweave/*
# package. No long-lived NPM_TOKEN stored anywhere — each run mints a
# short-lived token.
permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing requires npm >= 11.5.1. Node 22 bundles
      # 10.9.2 at the toolcache location. Prior attempts:
      #   1. `npm install -g npm@latest` — MODULE_NOT_FOUND
      #      'promise-retry' mid-self-replace, even with --force.
      #   2. `corepack prepare npm@11.5.1 --activate` — logs
      #      "Preparing..." but `which npm` still resolves to the
      #      toolcache 10.9.2; corepack's shim at /usr/local/bin
      #      loses the PATH lookup to setup-node's hostedtoolcache.
      # Working approach: install to a fresh user prefix so npm
      # 10.9.2 writes 11.5.1 into a NEW dir (no self-replace, no
      # promise-retry ghost), then prepend that dir via
      # $GITHUB_PATH so subsequent steps resolve npm → 11.5.1.
      - name: Install npm >= 11.5.1 (user-prefix to avoid self-replace)
        run: |
          npm config set prefix "$HOME/.npm-global"
          npm install -g npm@11.5.1
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Verify npm version
        run: |
          which npm
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      # Rewrite `"workspace:^"` to `"^<version>"` in every
      # packages/*/package.json BEFORE publishing.
      #
      # `bunx changeset publish` enters each package dir and runs
      # `npm publish` there; npm's built-in workspace-protocol
      # conversion only kicks in when publishing from the workspace
      # root with `-w <pkg>`, so from inside a sub-package dir the
      # `workspace:^` strings round-trip unchanged into the tarball.
      # Consumers then fail on `bun add @rxweave/cli` because
      # `workspace:^` has no meaning outside a workspace. This bug
      # shipped undetected from v0.3.0 through v0.4.0; every
      # downstream install was broken. Fix: pre-rewrite the refs so
      # the published package.json carries real caret ranges.
      #
      # Monorepo is version-locked — all @rxweave/* packages always
      # share one version — so a single substitution is safe.
      - name: Rewrite workspace:^ to actual version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "Rewriting workspace:^ → ^$VERSION across packages/*/package.json"
          for f in packages/*/package.json; do
            sed -i 's/"workspace:\^"/"^'"$VERSION"'"/g' "$f"
          done
          # Fail loudly if any workspace:^ slipped through.
          if grep -l '"workspace:\^"' packages/*/package.json; then
            echo "::error::workspace:^ references remain after rewrite" >&2
            exit 1
          fi
          echo "--- dependency ranges after rewrite ---"
          grep -E '"@rxweave/' packages/cli/package.json || true

      # Changesets publishes any package whose package.json version
      # isn't already on npm, in dependency order. No args / envs
      # needed — the npm CLI picks up the OIDC token automatically.
      - name: Publish
        run: bunx changeset publish

      # Post-publish smoke test: install the freshly-published CLI
      # from npm into an empty directory and exercise its entry +
      # one subcommand. Catches the regressions that bit v0.3.0 – v0.4.0:
      #   • `workspace:^` refs leaking into the tarball (bun add fails)
      #   • tarball missing files (bunx rxweave fails to load)
      #   • broken bin shebang / inlined JSON imports
      # None of these surface in the in-repo test suite because in a
      # workspace `workspace:^` resolves fine; they only appear from a
      # consumer's perspective. Run it here so a broken release fails
      # the workflow instead of being discovered by a user's `bun add`.
      - name: Smoke-test published CLI
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "Smoke-testing @rxweave/cli@$VERSION from a fresh directory"
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          printf '{"name":"rxweave-smoke","private":true}\n' > package.json
          # npm registry propagation can lag a few seconds after
          # `changeset publish` returns. Retry before declaring failure.
          for i in 1 2 3 4 5; do
            if bun add "@rxweave/cli@$VERSION"; then
              break
            fi
            if [ "$i" = "5" ]; then
              echo "::error::bun add @rxweave/cli@$VERSION failed after 5 attempts"
              exit 1
            fi
            echo "attempt $i failed, retrying in 10s..."
            sleep 10
          done
          ACTUAL=$(bunx rxweave --version)
          if [ "$ACTUAL" != "$VERSION" ]; then
            echo "::error::rxweave --version returned '$ACTUAL'; expected '$VERSION'"
            exit 1
          fi
          bunx rxweave serve --help > /dev/null
