name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# `id-token: write` is the OIDC token that npm's Trusted Publishing
# verifies against the repo + workflow configured on each @rxweave/*
# package. No long-lived NPM_TOKEN stored anywhere — each run mints a
# short-lived token.
permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing requires npm >= 11.5.1. Node 22 bundles
      # 10.9.2 at the toolcache location. Prior attempts:
      #   1. `npm install -g npm@latest` — MODULE_NOT_FOUND
      #      'promise-retry' mid-self-replace, even with --force.
      #   2. `corepack prepare npm@11.5.1 --activate` — logs
      #      "Preparing..." but `which npm` still resolves to the
      #      toolcache 10.9.2; corepack's shim at /usr/local/bin
      #      loses the PATH lookup to setup-node's hostedtoolcache.
      # Working approach: install to a fresh user prefix so npm
      # 10.9.2 writes 11.5.1 into a NEW dir (no self-replace, no
      # promise-retry ghost), then prepend that dir via
      # $GITHUB_PATH so subsequent steps resolve npm → 11.5.1.
      - name: Install npm >= 11.5.1 (user-prefix to avoid self-replace)
        run: |
          npm config set prefix "$HOME/.npm-global"
          npm install -g npm@11.5.1
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Verify npm version
        run: |
          which npm
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      # Changesets publishes any package whose package.json version
      # isn't already on npm, in dependency order, converting
      # workspace:^ → ^x.y.z along the way. No args / envs needed —
      # the npm CLI picks up the OIDC token automatically.
      - name: Publish
        run: bunx changeset publish
