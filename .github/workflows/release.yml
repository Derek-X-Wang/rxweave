name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      # `registry-url` makes setup-node write an ~/.npmrc that reads
      # NODE_AUTH_TOKEN from env — the token flows through the publish
      # step's `env:` block below, never appearing in logs.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      # Changesets publishes any package whose package.json version
      # isn't already on npm, in dependency order, converting
      # workspace:^ → ^x.y.z on the way out.
      - name: Publish
        run: bunx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
