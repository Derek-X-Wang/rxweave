name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# `id-token: write` is the OIDC token that npm's Trusted Publishing
# verifies against the repo + workflow configured on each @rxweave/*
# package. No long-lived NPM_TOKEN stored anywhere — each run mints a
# short-lived token.
permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing requires npm >= 11.5.1. Node 22 bundles
      # 10.9.2. `npm install -g npm@latest` breaks mid-self-replace
      # (`promise-retry` MODULE_NOT_FOUND) even with --force; corepack
      # sidesteps this by managing the shim separately from the
      # running npm.
      - name: Activate npm >= 11.5.1 via corepack
        run: |
          corepack enable
          corepack prepare npm@11.5.1 --activate
          npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      # Changesets publishes any package whose package.json version
      # isn't already on npm, in dependency order, converting
      # workspace:^ → ^x.y.z along the way. No args / envs needed —
      # the npm CLI picks up the OIDC token automatically.
      - name: Publish
        run: bunx changeset publish
